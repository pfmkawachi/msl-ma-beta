<!DOCTYPE html>
<html lang="ja" data-theme="dark" class="w-full h-full overflow-hidden bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <title>Motion Analyzer Gateway</title>
    <link rel="icon" type="image/png" href="./img/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./img/favicon.svg" />
    <link rel="shortcut icon" href="./img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./img/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="M-Analyzer" />
    <link rel="manifest" href="./site.webmanifest" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function dispatchDevice() {
            const ua = navigator.userAgent.toLowerCase();
            const isSmartphone = /iphone|ipod|android.*mobile|windows.*phone|blackberry/.test(ua);
            const isTablet = /ipad/.test(ua) || 
                             (navigator.maxTouchPoints && navigator.maxTouchPoints > 1 && /macintosh/.test(ua)) ||
                             (/android/.test(ua) && !/mobile/.test(ua));

            if (isSmartphone) {
                window.location.href = "sp.html";
            } else {
                window.location.href = "pc.html";
            }
        }
        window.addEventListener('DOMContentLoaded', dispatchDevice);
    </script>
</head>
<body class="w-full h-full flex flex-col items-center justify-center text-slate-100">
    <div class="flex flex-col items-center gap-4 animate-pulse">
        <div class="w-16 h-16 bg-gradient-to-tr from-primary to-accent rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20">
            <span class="loading loading-ring loading-lg text-white"></span>
        </div>
        <div class="text-center space-y-1">
            <h1 class="text-sm font-black tracking-widest text-white">CONNECTING</h1>
            <p class="text-[9px] opacity-40 font-mono tracking-wider">DETECTING YOUR DEVICE...</p>
        </div>
    </div>
</body>
</html>
