<!DOCTYPE html>
<html lang="ja" data-theme="dark" class="w-full h-full overflow-hidden select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <title>Motion Analyzer Mobile</title>
    <link rel="icon" type="image/png" href="./img/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./img/favicon.svg" />
    <link rel="shortcut icon" href="./img/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./img/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="M-Analyzer" />
    <link rel="manifest" href="./site.webmanifest" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <!-- QRコード読み取り用の軽量外部ライブラリを追加 -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        // 🐛 デバッグ機能のスイッチ。trueにするとerudaパネルと[DEBUG]ログが有効になる
        window.DEBUG_MODE = false;
        if (window.DEBUG_MODE) {
            const erudaScript = document.createElement('script');
            erudaScript.src = 'https://cdn.jsdelivr.net/npm/eruda';
            erudaScript.onload = () => eruda.init();
            document.head.appendChild(erudaScript);
        }
    </script>
    <script>
        // 🐛 DEBUG_MODEがfalseのときは何もしない、共通のログ出力ヘルパー
        function debugLog(...args) { if (window.DEBUG_MODE) console.log(...args); }
        function debugWarn(...args) { if (window.DEBUG_MODE) console.warn(...args); }
        function debugError(...args) { if (window.DEBUG_MODE) console.error(...args); }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            touch-action: none;
            overscroll-behavior: none;
        }

        .panel-transition {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        #v-player {
            will-change: transform;
            transition: transform 0.05s linear;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased p-0 m-0 w-full h-full">

    <div class="w-full h-full flex flex-col relative overflow-hidden" 
         x-data="mobileController()" 
         x-init="initApp()"
         @touchstart="handleGlobalTouchStart($event)"
         @touchmove="handleGlobalTouchMove($event)"
         @touchend="handleGlobalTouchEnd($event)">
        
        <!-- ==========================================
             A. 通常モード (動画解析 / 初期画面)
             ========================================== -->
        <div class="w-full flex-1 bg-black flex items-center justify-center relative z-10 pb-20 overflow-hidden"
             x-show="appMode === 'normal'"
             @touchstart="handleVideoTouchStart($event)"
             @touchmove="handleVideoTouchMove($event)"
             @touchend="handleVideoTouchEnd($event)">
            
            <video id="v-player" 
                   playsinline 
                   webkit-playsinline
                   :src="videoSrc" 
                   class="w-full h-full object-contain"
                   :style="`transform: translate(${zoomX}px, ${zoomY}px) scale(${zoomScale}) scaleX(${isMirrored ? -1 : 1});`"
                   @timeupdate="updateTime" 
                   @play="isPlaying = true" 
                   @pause="isPlaying = false" 
                   @loadedmetadata="onMetadataLoaded">
            </video>

            <!-- 初期画面 (既存デザイン完全維持 + PC接続ボタン追加) -->
            <div class="absolute inset-0 flex flex-col items-center justify-center p-4 text-center bg-gradient-to-b from-slate-900/60 to-slate-950/90 pointer-events-auto" x-show="!videoSrc">
                <div class="w-12 h-12 bg-gradient-to-tr from-primary to-accent rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20 mb-2">
                    <img src="./img/icon.svg" width="48">
                </div>
                <p class="text-[10px] font-mono mb-0">Modular Spin Lab</p>
                <h2 class="text-sm font-black tracking-wider text-white mt-2 mb-2"><img src="./img/logo.svg" alt="MOTION ANALYZER" width="280"></h2>
                <p class="text-[8px] opacity-40 font-mono mb-4">MOBILE beta v1.1 - 20260707</p>
                
                <div class="flex flex-col gap-3 w-48 relative">
                    <div class="relative w-full">
                        <button class="btn btn-primary btn-sm rounded-xl px-5 font-bold shadow-lg shadow-primary/30 text-xs w-full">CHOOSE VIDEO</button>
                        <input type="file" accept="video/*" @change="handleFileSelect" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                    </div>
                    <!-- 新設：PCと接続ボタン -->
                    <button @click="startQrScanMode" class="btn btn-outline btn-secondary btn-sm rounded-xl font-bold text-xs w-full">
                        PCと接続
                    </button>
                </div>
            </div>

            <!-- 通常再生時ヘッダー -->
            <div class="absolute top-4 left-4 right-4 flex justify-between items-center z-30 pointer-events-none" x-show="videoSrc" x-cloak>
                <div class="px-2.5 py-1 bg-slate-900/80 backdrop-blur rounded-lg border border-white/5 text-[10px] font-mono flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full" :class="isPlaying ? 'bg-success animate-pulse' : 'bg-warning'"></span>
                    <span class="text-white font-bold truncate max-w-[120px]" x-text="fileName"></span>
                </div>
                
                <div class="flex gap-1.5 pointer-events-auto">
                    <div class="relative">
                        <button class="btn btn-xs bg-slate-900/80 border-white/10 text-white rounded-md px-2 h-7 font-bold backdrop-blur text-[10px]">REPLACE</button>
                        <input type="file" accept="video/*" @change="handleFileSelect" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                    </div>
                </div>
            </div>
        </div>

        <!-- 通常モード：ボトム解析シート (既存のまま) -->
        <div class="fixed bottom-0 left-0 right-0 z-20 glass-panel panel-transition rounded-t-[24px] flex flex-col overflow-hidden shadow-2xl"
             :style="'height: 40vh; transform: translateY(' + (panelOpen ? '0' : 'calc(40vh - 78px)') + ');'"
             x-show="videoSrc && appMode === 'normal'" x-cloak>
            
            <div class="w-full pt-2 flex flex-col items-center justify-center cursor-pointer select-none shrink-0"
                 @touchstart="handlePanelTouchStart($event)"
                 @touchmove="handlePanelTouchMove($event)"
                 @touchend="handlePanelTouchEnd($event)"
                 @click="panelOpen = !panelOpen">
                <div class="w-8 h-1 bg-white/20 rounded-full"></div>
            </div>

            <div class="px-4 py-1.5 shrink-0 border-b border-white/5 flex items-center gap-3">
                <button @click="togglePlay" class="w-9 h-9 rounded-full bg-primary hover:bg-primary-focus flex items-center justify-center text-white shrink-0 shadow-md shadow-primary/20">
                    <template x-if="!isPlaying"><svg class="w-4 h-4 fill-current ml-0.5" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></template>
                    <template x-if="isPlaying"><svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></template>
                </button>
                
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-center font-mono text-[10px] mb-0.5">
                        <span class="font-black text-primary" x-text="formatTime(currentTime)">00:00.00</span>
                        <span class="opacity-40 font-bold" x-text="formatTime(duration)">00:00.00</span>
                    </div>
                    <input type="range" min="0" :max="duration" step="0.01" x-model="currentTime" @input="onSeek" class="range range-primary range-xs w-full cursor-pointer" />
                </div>
            </div>

            <div class="flex justify-center gap-1.5 py-1 bg-slate-950/40 shrink-0">
                <template x-for="i in maxTabs">
                    <span class="w-1 h-1 rounded-full transition-all duration-300" :class="activeTab === (i-1) ? 'bg-primary w-3' : 'bg-white/10'"></span>
                </template>
            </div>

            <div class="flex-1 w-full relative overflow-hidden bg-slate-950/10"
                 @touchstart="handleFlickTouchStart($event)"
                 @touchmove="handleFlickTouchMove($event)"
                 @touchend="handleFlickTouchEnd($event)">
                
                <div class="absolute inset-0 px-4 py-2 flex flex-col justify-between transition-all duration-300 transform" :style="getPanelStyle(0)">
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-black tracking-widest text-slate-400 font-mono">01 / CONTROLS</span>
                        <div class="flex items-center gap-2">
                            <div class="flex items-center gap-1 bg-slate-900 border border-white/5 px-2 py-0.5 rounded-lg">
                                <span class="text-[8px] font-mono font-bold text-slate-400">MIRROR</span>
                                <input type="checkbox" class="toggle toggle-accent toggle-xs" x-model="isMirrored" />
                            </div>
                            <div class="badge badge-outline border-white/10 px-1.5 py-2 bg-slate-900 font-mono text-[10px] font-bold text-secondary">
                                <select class="bg-transparent border-none outline-none cursor-pointer" x-model.number="fps" @change="saveSettings">
                                    <option value="24">24 FPS</option>
                                    <option value="30">30 FPS</option>
                                    <option value="60">60 FPS</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-2 my-1">
                        <button @click="stepFrame(-5)" class="btn btn-neutral btn-sm h-10 rounded-xl text-slate-300 font-mono text-xs">-5F</button>
                        <button @click="stepFrame(-1)" class="btn btn-outline btn-secondary btn-sm h-10 rounded-xl text-xs">◀</button>
                        <button @click="stepFrame(1)" class="btn btn-outline btn-secondary btn-sm h-10 rounded-xl text-xs">▶</button>
                        <button @click="stepFrame(5)" class="btn btn-neutral btn-sm h-10 rounded-xl text-slate-300 font-mono text-xs">+5F</button>
                    </div>

                    <div class="space-y-1.5 bg-slate-900/40 p-2 rounded-xl border border-white/5">
                        <div class="flex justify-between items-center text-[9px] font-mono text-slate-400">
                            <span>SPEED RATE</span>
                            <span class="text-accent font-black" x-text="currentSpeed.toFixed(2) + ' x'"></span>
                        </div>
                        <input type="range" min="0.25" max="2.0" step="0.05" x-model.number="currentSpeed" @input="changeSpeed" class="range range-accent range-xs w-full cursor-pointer" />
                        <div class="grid grid-cols-4 gap-1 text-[9px] font-mono">
                            <button @click="adjustSpeed(-0.05)" class="btn btn-xs h-6 rounded-md btn-outline border-white/5">-0.05</button>
                            <button @click="adjustSpeed(0.05)" class="btn btn-xs h-6 rounded-md btn-outline border-white/5">+0.05</button>
                            <button @click="setSpeed(1.0)" class="btn btn-xs h-6 rounded-md btn-neutral">1.0x</button>
                            <button @click="setSpeed(0.5)" class="btn btn-xs h-6 rounded-md btn-neutral">0.5x</button>
                        </div>
                    </div>
                </div>

                <div class="absolute inset-0 px-4 py-2 flex flex-col justify-between transition-all duration-300 transform" :style="getPanelStyle(1)">
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-black tracking-widest text-slate-400 font-mono">02 / INTERVAL LOOP</span>
                        <input type="checkbox" class="toggle toggle-primary toggle-xs" x-model="loopEnabled" :disabled="startPoint === null" />
                    </div>

                    <div class="grid grid-cols-2 gap-2 my-auto">
                        <button @click="setStartPoint" class="btn btn-sm h-10 rounded-lg text-[10px] font-black transition-all" :class="startPoint !== null ? 'btn-primary text-white' : 'btn-outline btn-primary'">SET POINT A</button>
                        <button @click="setEndPoint" class="btn btn-sm h-10 rounded-lg text-[10px] font-black transition-all" :class="endPoint !== null ? 'btn-secondary text-white' : 'btn-outline btn-secondary'">SET POINT B</button>
                        <button @click="jumpToStart" class="btn btn-xs btn-neutral h-8 rounded-md text-[10px] font-bold" :disabled="startPoint === null">JUMP TO A</button>
                        <button @click="clearLoop" class="btn btn-xs btn-ghost text-error h-8 rounded-md text-[10px] font-bold" :disabled="startPoint === null && endPoint === null">RESET LOOP</button>
                    </div>

                    <div class="grid grid-cols-2 gap-2 bg-slate-900/60 p-1.5 rounded-lg text-[10px] font-mono text-center border border-white/5">
                        <div class="border-r border-white/5"><span class="opacity-40 text-[8px] block">START A</span><span class="text-primary font-black" x-text="startPoint !== null ? formatTime(startPoint) : '--:--.--'"></span></div>
                        <div><span class="opacity-40 text-[8px] block">END B</span><span class="text-secondary font-black" x-text="endPoint !== null ? formatTime(endPoint) : '--:--.--'"></span></div>
                    </div>
                </div>

                <div class="absolute inset-0 px-4 py-2 flex flex-col justify-between transition-all duration-300 transform" :style="getPanelStyle(2)">
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-black tracking-widest text-slate-400 font-mono">03 / EXPORT</span>
                        <span class="text-[9px] font-mono text-emerald-400 font-bold">READY</span>
                    </div>

                    <div class="grid grid-cols-1 gap-2 my-auto">
                        <button @click="startQrScanMode" class="btn btn-outline btn-secondary btn-sm rounded-xl font-bold text-xs w-full">
                            PCと接続
                        </button>
                        <button @click="exportFullVideo" class="btn h-14 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-600 border-none text-white font-black tracking-wider text-xs shadow-md">
                            SAVE VIDEO
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- ==========================================
             B. QRコード読み取り画面 (完全別画面)
             ========================================== -->
        <div class="absolute inset-0 z-40 bg-slate-950 flex flex-col items-center justify-between p-6" x-show="appMode === 'qrScan'" x-cloak>
            <div class="w-full text-center mt-4">
                <h3 class="text-sm font-black text-secondary tracking-widest font-mono">QR CODE SCAN</h3>
                <p class="text-[11px] opacity-60 mt-1">PC画面の接続用QRコードをスキャンしてください</p>
            </div>
            
            <!-- スキャン用ファインダーエリア -->
            <div class="w-64 h-64 border-2 border-secondary/50 rounded-2xl relative overflow-hidden bg-black flex items-center justify-center shadow-2xl">
                <video id="qr-video" playsinline class="w-full h-full object-cover"></video>
                <!-- スキャン線アニメーション -->
                <div class="absolute left-0 right-0 h-0.5 bg-secondary opacity-60 shadow-[0_0_8px_#d946ef] top-0 animate-[bounce_2s_infinite]"></div>
            </div>

            <button @click="stopQrScanMode" class="btn btn-sm btn-ghost text-slate-400 text-xs px-6 rounded-xl mb-4">キャンセル</button>
        </div>

        <!-- ==========================================
             C. WebCamライブ配信モード (完全別画面)
             ========================================== -->
        <div class="absolute inset-0 z-50 bg-black flex items-center justify-center overflow-hidden" x-show="appMode === 'webCam'" x-cloak>
            <!-- 配信カメラ背景プレビュー -->
            <video id="webcam-preview" playsinline muted class="absolute inset-0 w-full h-full object-cover z-0"></video>

            <!-- 📐 三分割法ガイド線（構図確認用。操作を妨げないようクリックを透過する） -->
            <div class="absolute inset-0 z-10 pointer-events-none">
                <div class="absolute left-1/3 top-0 bottom-0 w-px bg-white/40"></div>
                <div class="absolute left-2/3 top-0 bottom-0 w-px bg-white/40"></div>
                <div class="absolute top-1/3 left-0 right-0 h-px bg-white/40"></div>
                <div class="absolute top-2/3 left-0 right-0 h-px bg-white/40"></div>
            </div>

            <!-- 🎥 配信中オーバーレイUI（画面の向きに関わらず常時表示） -->
            <div class="absolute inset-x-0 top-0 p-4 flex justify-between items-start z-20 pointer-events-none">
                <div class="flex flex-col gap-1 bg-slate-950/80 backdrop-blur px-3 py-1.5 rounded-xl border border-white/10 pointer-events-auto">
                    <span class="text-[9px] font-black tracking-widest text-accent font-mono">CONNECTED TO PC</span>
                    <div class="flex items-center gap-1.5 text-[10px] font-mono text-emerald-400 font-bold">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                        <span>STREAMING LIVE</span>
                    </div>
                </div>

                <button @click="disconnectFromPc" class="btn btn-xs btn-error btn-outline rounded-lg px-3 h-8 text-[11px] font-bold shadow-lg shadow-error/10 pointer-events-auto">
                    接続を解除する
                </button>
            </div>
        </div>

    </div>

    <!-- Canvas要素（QRコードデコード処理用・非表示） -->
    <canvas id="qr-canvas" class="hidden"></canvas>

    <script>
        function mobileController() {
            return {
                videoSrc: '',
                originalFile: null,
                fileName: '',
                isPlaying: false,
                currentSpeed: 1.0,
                currentTime: 0,
                duration: 0,
                fps: 30,
                videoElement: null,
                isUserSeeking: false,
                isMirrored: false,
                
                panelOpen: false,
                activeTab: 0,
                maxTabs: 3,

                // ⚡ 新設：画面モード・WebRTC・傾き管理ステート
                appMode: 'normal',       // 'normal' | 'qrScan' | 'webCam'
                topicId: '',            // ntfyルームID
                clientId: '',           // 自分の送信を判別するためのID
                chunkBuffers: {},       // 分割受信したメッセージを組み立てるための一時保存領域
                peerConnection: null,
                localStream: null,
                qrVideoElement: null,
                qrAnimateFrame: null,

                // ズーム・パン用ステート
                zoomScale: 1.0,
                zoomX: 0,
                zoomY: 0,
                baseScale: 1.0,
                baseX: 0,
                baseY: 0,
                touchStartDist: 0,
                touchStartMidX: 0,
                touchStartMidY: 0,
                isPinching: false,
                lastTapTime: 0,

                // シングルタップ連動用
                touchStartTime: 0,
                touchStartX: 0,
                touchStartY: 0,

                // フリック・シート用
                startY: 0,
                currentY: 0,
                flickStartX: 0,
                flickStartY: 0,

                // インターバルループ
                startPoint: null,
                endPoint: null,
                loopEnabled: false,

                initApp() {
                    this.fps = parseInt(localStorage.getItem('local_controller_fps') || '30');
                    this.videoElement = document.getElementById('v-player');
                    
                    let lastTouchEnd = 0;
                    document.addEventListener('touchend', (e) => {
                        const now = (new Date()).getTime();
                        if (now - lastTouchEnd <= 300) { e.preventDefault(); }
                        lastTouchEnd = now;
                    }, false);
                },

                // ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝
                // 📡 QRコードスキャンモードの制御
                // ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝
                async startQrScanMode() {
                    this.appMode = 'qrScan';
                    this.$nextTick(async () => {
                        this.qrVideoElement = document.getElementById('qr-video');
                        try {
                            // QR読み取り用に背面の標準カメラを取得
                            const stream = await navigator.mediaDevices.getUserMedia({
                                video: { facingMode: 'environment' }
                            });
                            this.qrVideoElement.srcObject = stream;
                            this.qrVideoElement.play();
                            // QR解析ループ起動
                            this.qrAnimateFrame = requestAnimationFrame(() => this.scanQrCodeLoop());
                        } catch (err) {
                            alert("カメラへのアクセスを許可してください: " + err.message);
                            this.stopQrScanMode();
                        }
                    });
                },

                stopQrScanMode() {
                    if (this.qrAnimateFrame) cancelAnimationFrame(this.qrAnimateFrame);
                    if (this.qrVideoElement && this.qrVideoElement.srcObject) {
                        this.qrVideoElement.srcObject.getTracks().forEach(track => track.stop());
                    }
                    this.appMode = 'normal';
                },

                scanQrCodeLoop() {
                    if (this.appMode !== 'qrScan') return;

                    const canvas = document.getElementById('qr-canvas');
                    if (this.qrVideoElement && this.qrVideoElement.readyState === this.qrVideoElement.HAVE_ENOUGH_DATA && canvas) {
                        const ctx = canvas.getContext('2d');
                        canvas.width = this.qrVideoElement.videoWidth;
                        canvas.height = this.qrVideoElement.videoHeight;
                        ctx.drawImage(this.qrVideoElement, 0, 0, canvas.width, canvas.height);
                        
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, imageData.width, imageData.height, {
                            inversionAttempts: "dontInvert",
                        });

                        // QRコードが読み取れ、かつ想定URL形式が含まれている場合
                        if (code && code.data.includes('room=')) {
                            try {
                                const url = new URL(code.data);
                                const room = url.searchParams.get('room');
                                if (room) {
                                    debugLog('[DEBUG] QR読み取り成功。roomId =', room);
                                    this.topicId = room;
                                    // 自分が送った信号を自分で拾わないよう、識別用のIDを発行する
                                    this.clientId = 'sp_' + Math.random().toString(36).substring(2, 10);
                                    // QR用カメラを停止してWebCamモードへ移行
                                    this.stopQrScanMode();
                                    this.startWebCamMode();
                                    return;
                                }
                            } catch (e) {
                                console.error("URLのパースに失敗しました", e);
                            }
                        }
                    }
                    this.qrAnimateFrame = requestAnimationFrame(() => this.scanQrCodeLoop());
                },

                // ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝
                // 🎥 WebCamライブ配信モードの制御
                // ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝ ＝
                async startWebCamMode() {
                    this.appMode = 'webCam';
                    this.$nextTick(async () => {
                        const previewVideo = document.getElementById('webcam-preview');
                        try {
                            this.localStream = await navigator.mediaDevices.getUserMedia({
                                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
                                audio: true
                            });
                            previewVideo.srcObject = this.localStream;
                            previewVideo.play();
                            debugLog('[DEBUG] カメラ起動成功。localStream取得済み');
                
                            // PCからのAnswerを待つためのリスナー
                            const eventSource = new EventSource(`https://ntfy.sh/${this.topicId}/sse`);
                            eventSource.onmessage = async (e) => {
                                const envelope = JSON.parse(e.data);

                                // ntfyは実データを envelope.message に文字列として格納して送ってくるため、
                                // もう一段JSON.parseして本来送りたかったデータを取り出す
                                if (!envelope.message) return; // keep-alive等、中身が無い通知は無視

                                let data;
                                try {
                                    data = JSON.parse(envelope.message);
                                } catch (err) {
                                    // ntfy側の制限超過メッセージなど、JSON以外が届くことがあるため無視する(念のための保険)
                                    debugWarn('[DEBUG] JSON以外のメッセージを受信したため無視:', envelope.message);
                                    return;
                                }

                                // 自分自身が送信したメッセージは無視する
                                if (data.from === this.clientId) return;

                                // PCからAnswerが分割送信されてくるので、全部揃ったら組み立てて処理する
                                if (data.event === 'answer-chunk') {
                                    const payload = this.receiveChunk(data);
                                    if (payload && payload.answer) {
                                        await this.peerConnection.setRemoteDescription(new RTCSessionDescription(payload.answer));
                                    }
                                }
                            };
                            this.eventSource = eventSource;
                
                            // ★映像の準備ができたら、スマホ側からPCへ接続を仕掛ける
                            this.setupPeerConnectionForSender();
                
                        } catch (err) {
                            alert("WebCam配信用のカメラ起動に失敗しました: " + err.message);
                            this.disconnectFromPc();
                        }
                    });
                },
                
                // 🧩 大きなデータをntfy.shの1メッセージ上限に収まるサイズへ分割して送信する
                // (Offer/AnswerのSDPは候補が多いと長くなり、そのまま送ると添付ファイル扱いになってしまうため)
                sendChunkedMessage(event, payloadObj) {
                    const json = JSON.stringify(payloadObj);
                    const chunkSize = 800; // ntfy.shの上限に対して余裕を持たせたサイズ
                    const totalChunks = Math.ceil(json.length / chunkSize);
                    const msgId = Math.random().toString(36).substring(2, 10);

                    for (let i = 0; i < totalChunks; i++) {
                        const chunk = json.slice(i * chunkSize, (i + 1) * chunkSize);
                        fetch(`https://ntfy.sh/${this.topicId}`, {
                            method: 'POST',
                            body: JSON.stringify({
                                event: `${event}-chunk`,
                                msgId,
                                index: i,
                                total: totalChunks,
                                chunk,
                                from: this.clientId
                            })
                        })
                        .then(res => debugLog(`[DEBUG] ${event}チャンク${i + 1}/${totalChunks} 送信完了。status =`, res.status))
                        .catch(err => debugError('[DEBUG] チャンク送信失敗:', err));
                    }
                    debugLog(`[DEBUG] ${event}を${totalChunks}個に分割して送信開始 (msgId=${msgId})`);
                },

                // 🧩 分割で届いたデータをmsgIdごとに集め、全部揃ったら元のオブジェクトに復元する
                // 揃っていない場合はnullを返す
                receiveChunk(data) {
                    const { msgId, index, total, chunk } = data;

                    if (!this.chunkBuffers[msgId]) {
                        this.chunkBuffers[msgId] = { total, parts: new Array(total) };
                    }
                    this.chunkBuffers[msgId].parts[index] = chunk;

                    const buf = this.chunkBuffers[msgId];
                    const receivedCount = buf.parts.filter(p => p !== undefined).length;
                    debugLog(`[DEBUG] チャンク受信 ${receivedCount}/${buf.total} (msgId=${msgId})`);

                    if (receivedCount < buf.total) return null; // まだ全部揃っていない

                    const fullJson = buf.parts.join('');
                    delete this.chunkBuffers[msgId];

                    try {
                        return JSON.parse(fullJson);
                    } catch (err) {
                        debugError('[DEBUG] チャンク結合後のJSON.parseに失敗:', err);
                        return null;
                    }
                },

                // スマホ側からOfferを送信するための関数を追加
                async setupPeerConnectionForSender() {
                    this.peerConnection = new RTCPeerConnection({
                        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                    });

                    // ICE candidateを1個ずつ送るのをやめ、候補が出揃うまで待ってからまとめて送る方式に変更
                    // (ntfy.shの送信回数制限にかかるのを防ぐため)
                    this.peerConnection.onicegatheringstatechange = () => {
                        if (this.peerConnection.iceGatheringState === 'complete') {
                            // Offerが大きくなりがちなので分割して送信する
                            this.sendChunkedMessage('offer', { offer: this.peerConnection.localDescription });
                        }
                    };

                    // 🔌 接続が切れたことを検知したら、自動で初期画面に戻す
                    this.peerConnection.oniceconnectionstatechange = () => {
                        const state = this.peerConnection.iceConnectionState;
                        debugLog('[DEBUG] iceConnectionState変化:', state);
                        if (['disconnected', 'failed', 'closed'].includes(state)) {
                            this.disconnectFromPc();
                        }
                    };
                
                    // 自分のカメラ映像・音声をトラックに追加
                    this.localStream.getTracks().forEach(track => {
                        this.peerConnection.addTrack(track, this.localStream);
                    });
                
                    // Offerを作成する(送信自体は上のonicegatheringstatechangeで候補が出揃ってから行う)
                    const offer = await this.peerConnection.createOffer();
                    await this.peerConnection.setLocalDescription(offer);
                },

                disconnectFromPc() {
                    if (this.eventSource) {
                        this.eventSource.close();
                        this.eventSource = null;
                    }
                    if (this.peerConnection) {
                        this.peerConnection.close();
                        this.peerConnection = null;
                    }
                    if (this.localStream) {
                        this.localStream.getTracks().forEach(track => track.stop());
                        this.localStream = null;
                    }
                    
                    const previewVideo = document.getElementById('webcam-preview');
                    if (previewVideo) previewVideo.srcObject = null;

                    // 完全に初期画面（normalモードかつ動画未読込）に巻き戻す
                    this.appMode = 'normal';
                },

                // 🔍 動画エリアのジェスチャーハンドラー（配信画面時は不干渉にするためガード付き）
                handleVideoTouchStart(e) {
                    if (!this.videoSrc || this.appMode !== 'normal') return;
                    const now = Date.now();
                    if (e.touches.length === 1) {
                        this.touchStartTime = now;
                        this.touchStartX = e.touches[0].clientX;
                        this.touchStartY = e.touches[0].clientY;
                    }
                    if (e.touches.length === 1 && (now - this.lastTapTime < 300)) {
                        this.resetZoom();
                        this.touchStartTime = 0;
                        this.lastTapTime = 0;
                        return;
                    }
                    if (e.touches.length === 1) { this.lastTapTime = now; }

                    if (e.touches.length === 2) {
                        this.isPinching = true;
                        const t1 = e.touches[0];
                        const t2 = e.touches[1];
                        this.touchStartDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                        this.touchStartMidX = (t1.clientX + t2.clientX) / 2;
                        this.touchStartMidY = (t1.clientY + t2.clientY) / 2;
                        this.baseScale = this.zoomScale;
                        this.baseX = this.zoomX;
                        this.baseY = this.zoomY;
                    }
                },

                handleVideoTouchMove(e) {
                    if (!this.videoSrc || this.appMode !== 'normal') return;
                    if (e.touches.length === 1 && this.touchStartTime > 0) {
                        const moveX = Math.abs(e.touches[0].clientX - this.touchStartX);
                        const moveY = Math.abs(e.touches[0].clientY - this.touchStartY);
                        if (moveX > 10 || moveY > 10) { this.touchStartTime = 0; }
                    }
                    if (!this.isPinching) return;
                    if (e.touches.length === 2) {
                        const t1 = e.touches[0];
                        const t2 = e.touches[1];
                        const currentDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                        const currentMidX = (t1.clientX + t2.clientX) / 2;
                        const currentMidY = (t1.clientY + t2.clientY) / 2;

                        if (this.touchStartDist > 0) {
                            const factor = currentDist / this.touchStartDist;
                            this.zoomScale = Math.min(Math.max(this.baseScale * factor, 1.0), 5.0);
                        }
                        if (this.zoomScale > 1.0) {
                            this.zoomX = this.baseX + (currentMidX - this.touchStartMidX);
                            this.zoomY = this.baseY + (currentMidY - this.touchStartMidY);
                        } else {
                            this.zoomX = 0;
                            this.zoomY = 0;
                        }
                    }
                },

                handleVideoTouchEnd(e) {
                    const now = Date.now();
                    if (this.appMode === 'normal' && this.touchStartTime > 0 && (now - this.touchStartTime < 250) && e.touches.length === 0 && !this.isPinching) {
                        setTimeout(() => {
                            if (Date.now() - this.lastTapTime >= 280) { this.togglePlay(); }
                        }, 50);
                    }
                    this.touchStartTime = 0;
                    if (e.touches.length < 2) {
                        this.isPinching = false;
                        if (this.zoomScale <= 1.0) { this.resetZoom(); }
                    }
                },

                resetZoom() {
                    this.zoomScale = 1.0;
                    this.zoomX = 0;
                    this.zoomY = 0;
                },

                handleGlobalTouchStart(e) {
                    this.flickStartX = e.touches[0].clientX;
                    this.flickStartY = e.touches[0].clientY;
                },
                handleGlobalTouchMove(e) {
                    if (this.flickStartX < 30 || this.flickStartX > window.innerWidth - 30) { e.preventDefault(); }
                },
                handleGlobalTouchEnd(e) {},

                handlePanelTouchStart(e) { this.startY = e.touches[0].clientY; },
                handlePanelTouchMove(e) {
                    this.currentY = e.touches[0].clientY;
                    let diff = this.startY - this.currentY;
                    if (diff > 40 && !this.panelOpen) { this.panelOpen = true; } 
                    else if (diff < -40 && this.panelOpen) { this.panelOpen = false; }
                },
                handlePanelTouchEnd(e) {},

                handleFlickTouchStart(e) {
                    this.flickStartX = e.touches[0].clientX;
                    this.flickStartY = e.touches[0].clientY;
                },
                handleFlickTouchMove(e) {},
                handleFlickTouchEnd(e) {
                    let diffX = e.changedTouches[0].clientX - this.flickStartX;
                    let diffY = e.changedTouches[0].clientY - this.flickStartY;
                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 60) {
                        if (diffX > 0 && this.activeTab > 0) { this.activeTab--; } 
                        else if (diffX < 0 && this.activeTab < this.maxTabs - 1) { this.activeTab++; }
                    }
                },

                getPanelStyle(index) {
                    let offset = (index - this.activeTab) * 100;
                    let opacity = index === this.activeTab ? 1 : 0;
                    let pointerEvents = index === this.activeTab ? 'auto' : 'none';
                    return `transform: translateX(${offset}%); opacity: ${opacity}; pointer-events: ${pointerEvents};`;
                },

                handleFileSelect(e) {
                    const file = e.target.files[0];
                    if (!file) return;

                    if (this.videoElement) { this.videoElement.pause(); }
                    this.isPlaying = false;
                    this.originalFile = file;
                    this.fileName = file.name;
                    
                    if (this.videoSrc) { URL.revokeObjectURL(this.videoSrc); }
                    this.videoSrc = URL.createObjectURL(file);
                    
                    this.currentSpeed = 1.0;
                    this.currentTime = 0;
                    this.isMirrored = false;
                    this.clearLoop();
                    this.resetZoom();
                    this.panelOpen = true;
                    this.appMode = 'normal';
                    
                    this.$nextTick(() => {
                        this.videoElement = document.getElementById('v-player');
                        this.videoElement.playbackRate = this.currentSpeed;
                        this.videoElement.play().catch(err => console.log(err));
                    });
                },

                onMetadataLoaded(e) { this.duration = e.target.duration; },
                togglePlay() {
                    if (!this.videoElement) return;
                    if (this.isPlaying) { this.videoElement.pause(); } 
                    else { this.videoElement.play(); }
                },

                updateTime(e) {
                    if (!this.isUserSeeking) { this.currentTime = e.target.currentTime; }
                    if (this.loopEnabled && this.startPoint !== null && this.endPoint !== null) {
                        if (e.target.currentTime >= this.endPoint) {
                            this.videoElement.currentTime = this.startPoint;
                            this.currentTime = this.startPoint;
                        }
                    }
                },

                onSeek() {
                    if (!this.videoElement) return;
                    this.isUserSeeking = true;
                    this.videoElement.currentTime = this.currentTime;
                    this.isUserSeeking = false;
                },

                setStartPoint() {
                    if (!this.videoElement) return;
                    this.startPoint = this.videoElement.currentTime;
                    if (this.endPoint !== null && this.startPoint >= this.endPoint) {
                        this.endPoint = null;
                        this.loopEnabled = false;
                    }
                    if (this.startPoint !== null && this.endPoint !== null) { this.loopEnabled = true; }
                },

                setEndPoint() {
                    if (!this.videoElement) return;
                    const targetTime = this.videoElement.currentTime;
                    if (this.startPoint !== null && targetTime <= this.startPoint) {
                        alert("B点はA点より後ろに指定してください。");
                        return;
                    }
                    this.endPoint = targetTime;
                    if (this.startPoint !== null) { this.loopEnabled = true; }
                },

                jumpToStart() {
                    if (!this.videoElement || this.startPoint === null) return;
                    this.videoElement.currentTime = this.startPoint;
                    this.currentTime = this.startPoint;
                },

                clearLoop() {
                    this.startPoint = null;
                    this.endPoint = null;
                    this.loopEnabled = false;
                },

                stepFrame(direction) {
                    if (!this.videoElement) return;
                    this.videoElement.pause();
                    const frameDuration = 1 / this.fps;
                    let newTime = this.videoElement.currentTime + (direction * frameDuration);
                    if (newTime < 0) newTime = 0;
                    if (newTime > this.duration) newTime = this.duration;
                    this.videoElement.currentTime = newTime;
                    this.currentTime = newTime;
                },

                changeSpeed() {
                    if (this.videoElement) { this.videoElement.playbackRate = this.currentSpeed; }
                },

                adjustSpeed(amount) {
                    this.currentSpeed = Math.min(Math.max(this.currentSpeed + amount, 0.25), 2.0);
                    this.changeSpeed();
                },

                setSpeed(speed) {
                    this.currentSpeed = speed;
                    this.changeSpeed();
                },

                formatTime(seconds) {
                    if (isNaN(seconds)) return "00:00.00";
                    const m = Math.floor(seconds / 60);
                    const s = Math.floor(seconds % 60);
                    const ms = Math.floor((seconds % 1) * 100);
                    return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
                },

                saveSettings() {
                    localStorage.setItem('local_controller_fps', this.fps.toString());
                },

                exportFullVideo() {
                    if (!this.originalFile) return;
                    const blobUrl = URL.createObjectURL(this.originalFile);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = `original_${this.fileName}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);
                }
            }
        }
    </script>
</body>
</html>
